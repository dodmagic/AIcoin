server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS. Resolving the upstream at request time (rather
    # than at startup) keeps Nginx from crashing if the backend is not yet up
    # and lets it follow backend container restarts.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Serve the static single-page frontend.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy API calls to the backend container.
    location /api/ {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy the backend health endpoint as well.
    location = /health {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream/health;
        proxy_set_header Host $host;
    }
}
