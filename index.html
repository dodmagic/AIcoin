<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIcoin - 比特币价格预测平台</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body class="dark-theme">
    <!-- 顶部导航 -->
    <header class="header">
        <div class="header-left">
            <h1 class="logo">🪙 AIcoin</h1>
            <span class="subtitle">比特币价格预测平台</span>
        </div>
        <div class="header-right">
            <div class="price-display">
                <span class="current-price" id="currentPrice">加载中...</span>
                <span class="price-change" id="priceChange"></span>
            </div>
            <button class="theme-toggle" id="themeToggle" title="切换主题">🌓</button>
        </div>
    </header>

    <!-- 控制面板 -->
    <div class="controls">
        <div class="control-group">
            <label>时间范围:</label>
            <div class="btn-group" id="timeRange">
                <button data-range="90" class="btn">3个月</button>
                <button data-range="180" class="btn">6个月</button>
                <button data-range="365" class="btn active">1年</button>
                <button data-range="730" class="btn">2年</button>
            </div>
        </div>
        <div class="control-group">
            <label>技术指标:</label>
            <div class="btn-group" id="indicators">
                <button data-indicator="ma" class="btn active">MA</button>
                <button data-indicator="ema" class="btn">EMA</button>
                <button data-indicator="boll" class="btn">BOLL</button>
            </div>
        </div>
        <div class="control-group">
            <label>预测模型:</label>
            <select id="predictionModel" class="select">
                <option value="ensemble">集成预测 (Ensemble)</option>
                <option value="arima">ARIMA 时间序列</option>
                <option value="prophet">Prophet</option>
                <option value="lstm">LSTM 深度学习</option>
                <option value="xgboost">XGBoost</option>
                <option value="combined">本地综合 (无后端)</option>
                <option value="linear">本地线性回归</option>
            </select>
        </div>
        <div class="control-group">
            <label>量化后端:</label>
            <input id="backendUrl" class="select" type="text"
                   placeholder="http://localhost:8000" title="Python 后端地址" />
        </div>
        <button class="btn btn-primary" id="refreshBtn">🔄 刷新数据</button>
    </div>

    <div class="backend-bar">
        <span id="backendStatus" class="backend-status">检测后端中…</span>
        <span id="backendStats" class="backend-stats"></span>
    </div>

    <!-- 主图表区域 -->
    <div class="main-content">
        <div class="chart-container">
            <div class="chart-header">
                <h2>BTC/USD K线图 & 预测走势</h2>
                <div class="chart-legend">
                    <span class="legend-item"><span class="legend-color" style="background:#26a69a"></span>历史K线</span>
                    <span class="legend-item"><span class="legend-color" style="background:#ff9800"></span>预测走势</span>
                    <span class="legend-item"><span class="legend-color" style="background:rgba(255,152,0,0.15)"></span>置信区间</span>
                </div>
            </div>
            <div id="mainChart" class="chart"></div>
            <div id="volumeChart" class="volume-chart"></div>
        </div>

        <!-- 预测分析面板 -->
        <div class="analysis-panel">
            <h3>📊 量化分析面板</h3>

            <div class="stat-card">
                <div class="stat-label">当前价格</div>
                <div class="stat-value" id="statCurrentPrice">--</div>
            </div>

            <div class="stat-card">
                <div class="stat-label">预测价格 (1个月)</div>
                <div class="stat-value" id="statPrice1m">--</div>
                <div class="stat-change" id="statChange1m"></div>
            </div>

            <div class="stat-card">
                <div class="stat-label">预测价格 (3个月)</div>
                <div class="stat-value" id="statPrice3m">--</div>
                <div class="stat-change" id="statChange3m"></div>
            </div>

            <div class="stat-card">
                <div class="stat-label">预测价格 (6个月)</div>
                <div class="stat-value" id="statPrice6m">--</div>
                <div class="stat-change" id="statChange6m"></div>
            </div>

            <div class="stat-card">
                <div class="stat-label">预测趋势</div>
                <div class="stat-value" id="statTrend">--</div>
            </div>

            <div class="stat-card">
                <div class="stat-label">置信度</div>
                <div class="stat-value" id="statConfidence">--</div>
                <div class="confidence-bar">
                    <div class="confidence-fill" id="confidenceFill"></div>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-label">波动率 (年化)</div>
                <div class="stat-value" id="statVolatility">--</div>
            </div>

            <div class="stat-card">
                <div class="stat-label">RSI (14日)</div>
                <div class="stat-value" id="statRSI">--</div>
            </div>

            <div class="disclaimer">
                ⚠️ 以上预测仅供参考，不构成投资建议。加密货币市场波动剧烈，请谨慎投资。
            </div>
        </div>
    </div>

    <!-- 加载遮罩 -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <p>正在加载数据...</p>
    </div>

    <footer class="footer">
        <p>AIcoin © 2026 | 数据来源: CoinGecko API | 仅供学习研究使用</p>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/backend.js"></script>
    <script src="js/prediction.js"></script>
    <script src="js/chart.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
