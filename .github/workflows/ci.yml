name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r backend/requirements.txt pytest httpx ruff

      - name: Ruff lint
        run: ruff check backend/

      - name: Run tests
        env:
          # Use deterministic synthetic data instead of hitting external APIs.
          AICOIN_DISABLE_NETWORK: "1"
        run: python -m pytest backend/tests/ -q

  frontend:
    name: Frontend lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Syntax-check JavaScript
        run: |
          set -e
          for f in js/*.js; do
            echo "node --check $f"
            node --check "$f"
          done

      - name: Validate index.html exists and is non-empty
        run: test -s index.html
