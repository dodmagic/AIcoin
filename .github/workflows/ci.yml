name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r backend/requirements.txt pytest httpx

      - name: Run tests
        env:
          # Use deterministic synthetic data instead of hitting external APIs.
          AICOIN_DISABLE_NETWORK: "1"
        run: python -m pytest backend/tests/ -q

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t aicoin-backend:ci .
