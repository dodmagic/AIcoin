# One-command stack for AIcoin (backend API + Nginx frontend).
#
# Pull pre-built images from GHCR and start:
#   docker compose pull && docker compose up -d
# Or build locally:
#   docker compose up --build -d
services:
  backend:
    image: ghcr.io/dodmagic/aicoin-backend:latest
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: aicoin-backend
    ports:
      - "8000:8000"
    environment:
      # Comma separated list of allowed CORS origins (use * for any).
      CORS_ORIGINS: "*"
      # Cache time-to-live for fetched candles, in seconds.
      CACHE_TTL_SECONDS: "3600"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    image: ghcr.io/dodmagic/aicoin-frontend:latest
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: aicoin-frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
